name: Release Extension

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build and Bundle
        run: npm run build

      - name: Package Extension
        run: |
          tar -czf orbit-extension.tar.gz \
            bundle/ \
            commands/ \
            skills/ \
            docs/ \
            gemini-extension.json \
            package.json \
            GEMINI.md \
            LICENSE \
            README.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: orbit-extension.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
