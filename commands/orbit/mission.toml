description = "Unified mission command to start, resume, or perform maneuvers (fix, review, implement) on a PR."
prompt = "I am preparing the mission for PR #{{args}}.\n\nActions available:\n- (default) Launch/Resume interactive agent session.\n- eva        - Extra-Vehicular Activity: Ingress into a raw bash capsule.\n- fix        - Execute automated orbital correction (fix playbook).\n- review     - Execute mission observation (review playbook).\n- implement  - Execute mission execution (implement playbook).\n\n!{ node \"$(ls -d ~/.gemini/extensions/orbit 2>/dev/null || echo .)/bundle/orchestrator.js\" {{args}} }"
